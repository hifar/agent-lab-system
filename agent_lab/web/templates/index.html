<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>agent-lab web chat</title>
  <style>
    :root {
      --bg-a: #f5f7f6;
      --bg-b: #e8eeeb;
      --panel: rgba(255, 255, 255, 0.92);
      --line: #d6e0db;
      --text: #15221d;
      --muted: #5e7268;
      --accent: #0f7a5a;
      --user: #e8f4ef;
      --assistant: #ffffff;
      --danger: #a83333;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(1200px 700px at 95% -10%, #d7efe5 0%, transparent 60%),
        radial-gradient(1000px 600px at -10% 110%, #dfeee8 0%, transparent 55%),
        linear-gradient(135deg, var(--bg-a), var(--bg-b));
      min-height: 100vh;
    }

    .shell {
      width: 100vw;
      height: 100vh;
      display: grid;
      grid-template-columns: 280px 1fr;
      overflow: hidden;
    }

    .sidebar {
      border-right: 1px solid var(--line);
      background: linear-gradient(180deg, #f8fbf9, #f1f6f3);
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      min-height: 0;
    }

    .side-head {
      padding: 14px;
      border-bottom: 1px solid var(--line);
    }

    .brand {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
    }

    .sub {
      margin: 4px 0 0;
      font-size: 12px;
      color: var(--muted);
    }

    .new-chat-wrap {
      padding: 12px;
      border-bottom: 1px solid var(--line);
    }

    .session-list {
      overflow: auto;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .session-item {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 10px;
      padding: 10px;
      text-align: left;
      cursor: pointer;
    }

    .session-item.active {
      border-color: #9fcbb7;
      background: #eef8f3;
    }

    .session-title {
      font-size: 13px;
      font-weight: 600;
      margin: 0 0 4px;
      color: var(--text);
    }

    .session-meta {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.4;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .session-actions {
      margin-top: 8px;
      display: flex;
      gap: 6px;
    }

    .session-act-btn {
      padding: 4px 8px;
      font-size: 11px;
      border-radius: 6px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--muted);
      cursor: pointer;
    }

    .session-act-btn:hover {
      border-color: #9fcbb7;
      color: #2f4b40;
    }

    .side-foot {
      padding: 12px;
      border-top: 1px solid var(--line);
      display: flex;
      gap: 8px;
    }

    .chat {
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: 0;
    }

    .top {
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255, 255, 255, 0.72);
    }

    .top-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .chat-title {
      font-size: 14px;
      font-weight: 700;
    }

    .status {
      font-size: 12px;
      color: var(--muted);
    }

    .messages {
      overflow: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .msg {
      max-width: 86%;
      border-radius: 12px;
      padding: 12px 14px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
      border: 1px solid var(--line);
      background: #fff;
    }

    .msg.user {
      align-self: flex-end;
      background: var(--user);
      border-color: #c7dfd3;
    }

    .msg.assistant {
      align-self: flex-start;
      background: var(--assistant);
    }

    .meta {
      margin-top: 8px;
      font-family: Consolas, "Cascadia Mono", "Courier New", monospace;
      font-size: 11px;
      color: var(--muted);
      opacity: .9;
    }

    .composer {
      border-top: 1px solid var(--line);
      padding: 12px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      background: rgba(255, 255, 255, 0.72);
    }

    textarea {
      resize: none;
      min-height: 72px;
      max-height: 200px;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      background: #fff;
    }

    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(15, 122, 90, 0.15);
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 13px;
      cursor: pointer;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    .send {
      background: var(--accent);
      color: #fff;
      min-width: 110px;
      font-weight: 700;
    }

    .ghost {
      background: #eef3f1;
      color: #31463d;
    }

    .danger {
      background: #fde8e8;
      color: var(--danger);
    }

    .dialog-mask {
      position: fixed;
      inset: 0;
      background: rgba(16, 24, 20, 0.35);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 50;
    }

    .dialog {
      width: min(520px, 100%);
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
    }

    .dialog-head {
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      font-weight: 700;
      font-size: 14px;
    }

    .dialog-body {
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 70vh;
      overflow: auto;
    }

    .field label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .field input,
    .field select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px 10px;
      font-size: 13px;
      color: var(--text);
      background: #fff;
      outline: none;
    }

    .field input:focus,
    .field select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(15, 122, 90, 0.15);
    }

    .check {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--muted);
    }

    .dialog-foot {
      padding: 12px 14px;
      border-top: 1px solid var(--line);
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .session-context {
      font-size: 11px;
      color: var(--muted);
      white-space: pre-wrap;
      line-height: 1.4;
      margin-top: 4px;
    }

    @media (max-width: 960px) {
      .shell {
        grid-template-columns: 1fr;
        grid-template-rows: 220px 1fr;
      }
      .sidebar {
        border-right: none;
        border-bottom: 1px solid var(--line);
      }
      .session-list {
        display: grid;
        grid-template-columns: 1fr 1fr;
      }
      .msg {
        max-width: 96%;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="side-head">
        <h1 class="brand">agent-lab web</h1>
        <p class="sub">Session-based chat workspace</p>
      </div>

      <div class="new-chat-wrap">
        <button id="newChatBtn" class="send" style="width:100%">+ New Chat</button>
      </div>

      <div id="sessionList" class="session-list"></div>

      <div class="side-foot">
        <button id="openSettingsBtn" class="ghost" style="width:100%">Settings</button>
      </div>
    </aside>

    <section class="chat">
      <header class="top">
        <div>
          <div id="chatTitle" class="chat-title">No session</div>
          <div id="chatContext" class="session-context"></div>
        </div>
        <div class="top-right">
          <button id="openLogBtn" class="ghost">Logs</button>
          <div id="status" class="status">idle</div>
        </div>
      </header>

      <main id="messages" class="messages"></main>

      <footer class="composer">
        <textarea id="input" placeholder="Type your message... (Enter to send, Shift+Enter for newline)"></textarea>
        <div class="actions">
          <button id="sendBtn" class="send">Send</button>
          <button id="stopBtn" class="ghost">Stop</button>
          <button id="clearBtn" class="danger">Clear</button>
        </div>
      </footer>
    </section>
  </div>

  <div id="newChatDialog" class="dialog-mask">
    <div class="dialog">
      <div class="dialog-head">Create New Chat</div>
      <div class="dialog-body">
        <div class="field">
          <label for="newChatTitle">Chat title</label>
          <input id="newChatTitle" placeholder="My Chat" />
        </div>
        <div class="field">
          <label for="newChatSession">Session ID</label>
          <input id="newChatSession" placeholder="session-001" />
        </div>
        <div class="field">
          <label for="newChatWorkspace">Workspace (required)</label>
          <input id="newChatWorkspace" placeholder="d:/workspace/ws01" />
        </div>
        <div class="field">
          <label for="newChatBackground">Background (optional)</label>
          <input id="newChatBackground" placeholder="d:/shared/background" />
        </div>
      </div>
      <div class="dialog-foot">
        <button id="cancelNewChatBtn" class="ghost">Cancel</button>
        <button id="createNewChatBtn" class="send">Create</button>
      </div>
    </div>
  </div>

  <div id="settingsDialog" class="dialog-mask">
    <div class="dialog">
      <div class="dialog-head">Settings</div>
      <div class="dialog-body">
        <div class="field">
          <label for="apiBase">API Base</label>
          <input id="apiBase" placeholder="http://127.0.0.1:8000" />
        </div>
        <div class="field">
          <label for="apiKey">API Key (optional)</label>
          <input id="apiKey" type="password" placeholder="Bearer key" />
        </div>
        <div class="field">
          <label for="model">Model</label>
          <input id="model" placeholder="qwen3.5-flash / gpt-4o ..." />
        </div>
        <div class="field">
          <label for="sessionMode">Session Mode</label>
          <select id="sessionMode">
            <option value="append">append</option>
            <option value="stateless">stateless</option>
            <option value="replace">replace</option>
          </select>
        </div>
        <div class="field">
          <label for="maxTokens">Max Tokens (optional)</label>
          <input id="maxTokens" placeholder="4096" />
        </div>
        <div class="field">
          <label for="temperature">Temperature (optional)</label>
          <input id="temperature" placeholder="0.7" />
        </div>
        <label class="check"><input id="thinkMode" type="checkbox" /> think_mode</label>
        <label class="check"><input id="rebuildPrompt" type="checkbox" /> rebuild_system_prompt</label>
      </div>
      <div class="dialog-foot">
        <button id="cancelSettingsBtn" class="ghost">Cancel</button>
        <button id="saveSettingsBtn" class="send">Save</button>
      </div>
    </div>
  </div>

  <script>
    const DEFAULTS = __DEFAULTS_JSON__;
    const SETTINGS_STORAGE_KEY = "agent_lab_web_ui_settings_v2";
    const CHATS_STORAGE_KEY = "agent_lab_web_ui_chats_v2";

    const el = (id) => document.getElementById(id);

    const state = {
      settings: {
        apiBase: DEFAULTS.apiBase || "http://127.0.0.1:8000",
        apiKey: DEFAULTS.apiKey || "",
        model: DEFAULTS.model || "",
        sessionMode: DEFAULTS.sessionMode || "append",
        thinkMode: !!DEFAULTS.thinkMode,
        rebuildSystemPrompt: !!DEFAULTS.rebuildSystemPrompt,
        maxTokens: DEFAULTS.maxTokens || "",
        temperature: DEFAULTS.temperature || "",
      },
      chats: [],
      activeChatId: null,
      controller: null,
      running: false,
    };

    function nowIso() {
      return new Date().toISOString();
    }

    function createSessionId() {
      return "s-" + Date.now().toString(36) + "-" + Math.random().toString(36).slice(2, 7);
    }

    function dateKey() {
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return "" + y + m + day;
    }

    function nextChatDefaultTitle() {
      const key = "Chat_" + dateKey();
      let maxSeq = 0;
      for (const c of state.chats) {
        if (!c || typeof c.title !== "string") continue;
        const m = c.title.match(new RegExp("^" + key + "_(\\\\d+)$"));
        if (!m) continue;
        const n = Number(m[1]);
        if (Number.isFinite(n) && n > maxSeq) {
          maxSeq = n;
        }
      }
      return key + "_" + String(maxSeq + 1).padStart(2, "0");
    }

    function createChat(title, session, workspace, background) {
      return {
        id: "chat-" + Date.now().toString(36) + "-" + Math.random().toString(36).slice(2, 7),
        title: title || "New Chat",
        session,
        workspace,
        background: background || "",
        messages: [],
        createdAt: nowIso(),
      };
    }

    function activeChat() {
      return state.chats.find((c) => c.id === state.activeChatId) || null;
    }

    function saveSettings() {
      localStorage.setItem(SETTINGS_STORAGE_KEY, JSON.stringify(state.settings));
    }

    function loadSettings() {
      try {
        const raw = localStorage.getItem(SETTINGS_STORAGE_KEY);
        if (!raw) return;
        const parsed = JSON.parse(raw);
        if (parsed && typeof parsed === "object") {
          state.settings = { ...state.settings, ...parsed };
        }
      } catch (err) {
        console.warn("loadSettings failed", err);
      }
    }

    function saveChats() {
      localStorage.setItem(CHATS_STORAGE_KEY, JSON.stringify({ chats: state.chats, activeChatId: state.activeChatId }));
    }

    function loadChats() {
      try {
        const raw = localStorage.getItem(CHATS_STORAGE_KEY);
        if (!raw) return;
        const parsed = JSON.parse(raw);
        if (parsed && Array.isArray(parsed.chats)) {
          state.chats = parsed.chats;
          state.activeChatId = parsed.activeChatId || (state.chats[0] ? state.chats[0].id : null);
        }
      } catch (err) {
        console.warn("loadChats failed", err);
      }
    }

    function setStatus(text) {
      el("status").textContent = text;
    }

    function lockUi(locked) {
      state.running = locked;
      el("sendBtn").disabled = locked;
      el("input").disabled = locked;
      el("newChatBtn").disabled = locked;
    }

    function renderSessionList() {
      const container = el("sessionList");
      container.innerHTML = "";

      for (const chat of state.chats) {
        const btn = document.createElement("button");
        btn.className = "session-item" + (chat.id === state.activeChatId ? " active" : "");

        const title = document.createElement("div");
        title.className = "session-title";
        title.textContent = chat.title;

        const meta = document.createElement("div");
        meta.className = "session-meta";
        meta.textContent = "session=" + chat.session + "\nworkspace=" + (chat.workspace || "(empty)");

        const actions = document.createElement("div");
        actions.className = "session-actions";

        const renameBtn = document.createElement("button");
        renameBtn.className = "session-act-btn";
        renameBtn.textContent = "Rename";
        renameBtn.addEventListener("click", (ev) => {
          ev.stopPropagation();
          renameChat(chat.id);
        });

        const deleteBtn = document.createElement("button");
        deleteBtn.className = "session-act-btn";
        deleteBtn.textContent = "Delete";
        deleteBtn.addEventListener("click", (ev) => {
          ev.stopPropagation();
          deleteChat(chat.id);
        });

        actions.appendChild(renameBtn);
        actions.appendChild(deleteBtn);

        btn.appendChild(title);
        btn.appendChild(meta);
        btn.appendChild(actions);
        btn.addEventListener("click", () => {
          if (state.running) return;
          state.activeChatId = chat.id;
          saveChats();
          renderAll();
        });

        container.appendChild(btn);
      }
    }

    function appendMessage(role, text, meta = "") {
      const box = document.createElement("article");
      box.className = "msg " + role;

      const body = document.createElement("div");
      body.textContent = text;
      box.appendChild(body);

      let metaNode = null;
      if (meta) {
        const md = document.createElement("div");
        md.className = "meta";
        md.textContent = meta;
        box.appendChild(md);
        metaNode = md;
      }

      el("messages").appendChild(box);
      el("messages").scrollTop = el("messages").scrollHeight;

      return { body, metaNode };
    }

    function renderMessages() {
      const messagesEl = el("messages");
      messagesEl.innerHTML = "";

      const chat = activeChat();
      if (!chat) {
        appendMessage("assistant", "Click New Chat to start.");
        return;
      }

      if (!Array.isArray(chat.messages) || chat.messages.length === 0) {
        appendMessage("assistant", "New session ready. Workspace is locked for this chat.");
        return;
      }

      for (const m of chat.messages) {
        appendMessage(m.role, m.content || "");
      }
    }

    function renderHeader() {
      const chat = activeChat();
      if (!chat) {
        el("chatTitle").textContent = "No session";
        el("chatContext").textContent = "Create a new chat to set workspace/session.";
        return;
      }

      el("chatTitle").textContent = chat.title;
      let context = "session=" + chat.session + "\nworkspace=" + (chat.workspace || "(empty)");
      if (chat.background) {
        context += "\nbackground=" + chat.background;
      }
      el("chatContext").textContent = context;
    }

    function renderAll() {
      renderSessionList();
      renderHeader();
      renderMessages();
    }

    function parseSSEChunk(chunkText, onEvent) {
      const blocks = chunkText.split("\n\n");
      for (const block of blocks) {
        const line = block.split("\n").find((ln) => ln.startsWith("data:"));
        if (!line) continue;
        const raw = line.slice(5).trim();
        if (!raw) continue;
        try {
          const evt = JSON.parse(raw);
          onEvent(evt);
        } catch (_err) {
          // Ignore non-json lines.
        }
      }
    }

    function consumeSSEBuffer(buffer, onEvent) {
      const normalized = buffer.replace(/\r\n/g, "\n");
      const blocks = normalized.split("\n\n");
      const remainder = blocks.pop() || "";
      const complete = blocks.join("\n\n");
      if (complete) {
        parseSSEChunk(complete, onEvent);
      }
      return remainder;
    }

    async function sendMessage() {
      if (state.running) return;

      const chat = activeChat();
      if (!chat) {
        setStatus("create chat first");
        return;
      }

      const input = el("input");
      const userText = input.value.trim();
      if (!userText) return;

      const history = [...chat.messages, { role: "user", content: userText }];
      chat.messages.push({ role: "user", content: userText });
      saveChats();
      renderMessages();

      const assistantView = appendMessage("assistant", "", "streaming");
      input.value = "";

      const payload = {
        api_base: state.settings.apiBase,
        api_key: state.settings.apiKey || null,
        model: state.settings.model || null,
        workspace: chat.workspace,
        background: chat.background || null,
        session: chat.session,
        session_mode: state.settings.sessionMode,
        think_mode: state.settings.thinkMode,
        rebuild_system_prompt: state.settings.rebuildSystemPrompt,
        max_tokens: state.settings.maxTokens ? Number(state.settings.maxTokens) : null,
        temperature: state.settings.temperature ? Number(state.settings.temperature) : null,
        stream: true,
        history,
      };

      state.controller = new AbortController();
      lockUi(true);
      setStatus("running");

      let assistantText = "";
      let buffered = "";
      let gotDone = false;

      try {
        const response = await fetch("/proxy/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
          signal: state.controller.signal,
        });

        if (!response.ok || !response.body) {
          throw new Error("HTTP " + response.status);
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder();

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;

          buffered += decoder.decode(value, { stream: true });

          buffered = consumeSSEBuffer(buffered, (evt) => {
            if (evt.type === "delta" && typeof evt.text === "string") {
              assistantText += evt.text;
              assistantView.body.textContent = assistantText;
              el("messages").scrollTop = el("messages").scrollHeight;
            } else if (evt.type === "error") {
              assistantText += (assistantText ? "\n" : "") + "[error] " + (evt.message || "unknown error");
              assistantView.body.textContent = assistantText;
            } else if (evt.type === "done") {
              gotDone = true;
            }
          });

          if (gotDone) {
            await reader.cancel();
            break;
          }
        }

        buffered += decoder.decode();
        buffered = consumeSSEBuffer(buffered, (evt) => {
          if (evt.type === "delta" && typeof evt.text === "string") {
            assistantText += evt.text;
            assistantView.body.textContent = assistantText;
          }
        });

        if (assistantView.metaNode) {
          assistantView.metaNode.textContent = "done";
        }

        chat.messages.push({ role: "assistant", content: assistantText || "(empty response)" });
        saveChats();
        setStatus("idle");
      } catch (err) {
        const msg = String(err?.message || err || "request failed");
        assistantView.body.textContent = "[error] " + msg;
        if (assistantView.metaNode) {
          assistantView.metaNode.textContent = "error";
        }
        chat.messages.push({ role: "assistant", content: "[error] " + msg });
        saveChats();
        setStatus("error");
      } finally {
        lockUi(false);
        state.controller = null;
      }
    }

    function stopRunning() {
      if (state.controller) {
        state.controller.abort();
      }
    }

    function clearCurrentChat() {
      const chat = activeChat();
      if (!chat || state.running) return;
      chat.messages = [];
      saveChats();
      renderMessages();
      setStatus("idle");
    }

    function openDialog(id) {
      el(id).style.display = "flex";
    }

    function closeDialog(id) {
      el(id).style.display = "none";
    }

    function openNewChatDialog() {
      el("newChatTitle").value = nextChatDefaultTitle();
      el("newChatSession").value = createSessionId();
      el("newChatWorkspace").value = "";
      el("newChatBackground").value = "";
      openDialog("newChatDialog");
    }

    function createNewChatFromDialog() {
      const title = el("newChatTitle").value.trim() || nextChatDefaultTitle();
      const session = el("newChatSession").value.trim() || createSessionId();
      const workspace = el("newChatWorkspace").value.trim();
      const background = el("newChatBackground").value.trim();

      const chat = createChat(title, session, workspace, background);
      state.chats.unshift(chat);
      state.activeChatId = chat.id;
      saveChats();
      closeDialog("newChatDialog");
      renderAll();
      setStatus("idle");
    }

    function renameChat(chatId) {
      const chat = state.chats.find((c) => c.id === chatId);
      if (!chat) return;

      const nextName = prompt("Rename chat", chat.title || "");
      if (nextName === null) return;

      const trimmed = nextName.trim();
      if (!trimmed) return;

      chat.title = trimmed;
      saveChats();
      renderAll();
    }

    function deleteChat(chatId) {
      const chat = state.chats.find((c) => c.id === chatId);
      if (!chat) return;

      const ok = confirm("Delete chat: " + (chat.title || "(untitled)") + " ?");
      if (!ok) return;

      const idx = state.chats.findIndex((c) => c.id === chatId);
      if (idx < 0) return;
      state.chats.splice(idx, 1);

      if (state.activeChatId === chatId) {
        state.activeChatId = state.chats.length ? state.chats[0].id : null;
      }

      saveChats();
      renderAll();

      if (!state.chats.length) {
        openNewChatDialog();
      }
    }

    function bindSettingsToForm() {
      el("apiBase").value = state.settings.apiBase || "";
      el("apiKey").value = state.settings.apiKey || "";
      el("model").value = state.settings.model || "";
      el("sessionMode").value = state.settings.sessionMode || "append";
      el("maxTokens").value = state.settings.maxTokens || "";
      el("temperature").value = state.settings.temperature || "";
      el("thinkMode").checked = !!state.settings.thinkMode;
      el("rebuildPrompt").checked = !!state.settings.rebuildSystemPrompt;
    }

    function saveSettingsFromForm() {
      state.settings = {
        apiBase: el("apiBase").value.trim(),
        apiKey: el("apiKey").value,
        model: el("model").value.trim(),
        sessionMode: el("sessionMode").value,
        maxTokens: el("maxTokens").value.trim(),
        temperature: el("temperature").value.trim(),
        thinkMode: el("thinkMode").checked,
        rebuildSystemPrompt: el("rebuildPrompt").checked,
      };
      saveSettings();
      closeDialog("settingsDialog");
    }

    function wireEvents() {
      el("sendBtn").addEventListener("click", sendMessage);
      el("stopBtn").addEventListener("click", stopRunning);
      el("clearBtn").addEventListener("click", clearCurrentChat);

      el("input").addEventListener("keydown", (ev) => {
        if (ev.key === "Enter" && !ev.shiftKey) {
          ev.preventDefault();
          sendMessage();
        }
      });

      el("openLogBtn").addEventListener("click", () => {
        const chat = activeChat();
        const workspace = chat ? (chat.workspace || "") : "";
        const target = "/logs?workspace=" + encodeURIComponent(workspace);
        window.open(target, "_blank");
      });

      el("newChatBtn").addEventListener("click", openNewChatDialog);
      el("cancelNewChatBtn").addEventListener("click", () => closeDialog("newChatDialog"));
      el("createNewChatBtn").addEventListener("click", createNewChatFromDialog);

      el("openSettingsBtn").addEventListener("click", () => {
        bindSettingsToForm();
        openDialog("settingsDialog");
      });
      el("cancelSettingsBtn").addEventListener("click", () => closeDialog("settingsDialog"));
      el("saveSettingsBtn").addEventListener("click", saveSettingsFromForm);

      el("newChatDialog").addEventListener("click", (ev) => {
        if (ev.target === el("newChatDialog")) closeDialog("newChatDialog");
      });
      el("settingsDialog").addEventListener("click", (ev) => {
        if (ev.target === el("settingsDialog")) closeDialog("settingsDialog");
      });
    }

    function bootstrap() {
      loadSettings();
      loadChats();

      if (!state.chats.length) {
        state.activeChatId = null;
      }

      wireEvents();
      bindSettingsToForm();
      renderAll();
      setStatus("idle");

      if (!state.chats.length) {
        openNewChatDialog();
      }
    }

    bootstrap();
  </script>
</body>
</html>
